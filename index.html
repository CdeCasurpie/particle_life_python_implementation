<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Particle Life Simulation</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
    
    :root {
      --bg: #050505;
      --panel-bg: rgba(15, 15, 20, 0.65);
      --panel-border: rgba(255, 255, 255, 0.1);
      --text: #eaeaea;
      --accent: #00ffcc;
    }

    body {
      margin: 0;
      overflow: hidden;
      background-color: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--text);
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    #ui-container {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 320px;
      max-height: calc(100vh - 40px);
      overflow-y: auto;
      background: var(--panel-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      z-index: 10;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    #ui-container.hidden {
      transform: translateX(-120%);
      opacity: 0;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .header h1 {
      margin: 0;
      font-size: 1.2rem;
      font-weight: 600;
      background: linear-gradient(90deg, #00ffcc, #ff00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .control-group {
      margin-bottom: 15px;
    }

    .control-group label {
      display: block;
      font-size: 0.85rem;
      margin-bottom: 6px;
      color: #aaa;
    }

    .value-display {
      float: right;
      color: var(--accent);
      font-weight: 600;
    }

    input[type="range"] {
      width: 100%;
      -webkit-appearance: none;
      background: rgba(255, 255, 255, 0.1);
      height: 4px;
      border-radius: 2px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    .btn-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 20px;
    }

    button {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--panel-border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      transition: all 0.2s;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: var(--accent);
    }
    
    button.primary {
      background: rgba(0, 255, 204, 0.15);
      border-color: var(--accent);
      color: var(--accent);
    }

    select {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--panel-border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.85rem;
      outline: none;
    }

    #toggle-ui {
      position: absolute;
      top: 20px;
      right: 20px;
      background: var(--panel-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--panel-border);
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      z-index: 10;
      font-size: 0.85rem;
      transition: 0.2s;
    }
    
    #toggle-ui:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--accent);
    }

    .matrix-display {
      display: grid;
      gap: 2px;
      margin-top: 10px;
      background: rgba(0,0,0,0.3);
      padding: 10px;
      border-radius: 8px;
    }
    
    .matrix-row {
      display: flex;
      gap: 2px;
    }
    
    .matrix-cell {
      flex: 1;
      aspect-ratio: 1;
      border-radius: 2px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.2);
      border-radius: 3px;
    }
  </style>
</head>
<body>

  <div id="toggle-ui">Hide UI (Tab)</div>

  <div id="ui-container">
    <div class="header">
      <h1>Particle Life</h1>
      <span id="fpsDisplay">60 FPS</span>
    </div>

    <div class="control-group">
      <label>Preset Engine</label>
      <select id="presetSelect">
        <option value="cells">Cells (Organisms)</option>
        <option value="worms">Worms</option>
        <option value="snakes">Snakes</option>
        <option value="chaos">Chaos</option>
        <option value="random" selected>Random Discovery</option>
      </select>
    </div>

    <div class="control-group">
      <label>Particle Count <span id="countVal" class="value-display">4000</span></label>
      <input type="range" id="countSlider" min="500" max="8000" step="500" value="4000">
    </div>

    <div class="control-group">
      <label>Max Interaction Radius (rMax) <span id="rmaxVal" class="value-display">95</span></label>
      <input type="range" id="rmaxSlider" min="20" max="250" step="5" value="95">
    </div>

    <div class="control-group">
      <label>Friction / Viscosity <span id="frictionVal" class="value-display">0.78</span></label>
      <input type="range" id="frictionSlider" min="0.1" max="0.99" step="0.01" value="0.78">
    </div>
    
    <div class="control-group">
      <label>Force Multiplier <span id="forceVal" class="value-display">0.5</span></label>
      <input type="range" id="forceSlider" min="0.1" max="5.0" step="0.1" value="0.5">
    </div>
    
    <div class="control-group">
      <label>Trails (Motion Blur) <span id="trailVal" class="value-display">0.3</span></label>
      <input type="range" id="trailSlider" min="0" max="1" step="0.05" value="0.3">
    </div>

    <div class="btn-grid">
      <button id="btnRandomize" class="primary">Randomize Rules</button>
      <button id="btnRestart">Scatter Particles</button>
    </div>

    <div style="margin-top: 15px; color: #888; font-size: 0.75rem; line-height: 1.4;">
      <b>Controls:</b><br/>
      Arrows: Move Camera<br/>
      Z / X: Zoom In / Out<br/>
      C: Reset Camera<br/>
      Tab: Toggle UI
    </div>

    <div style="margin-top: 20px;">
      <label style="font-size: 0.85rem; color: #aaa;">Interaction Matrix (Attract / Repel)</label>
      <div id="matrixDisplay" class="matrix-display"></div>
    </div>
  </div>

  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true });
    
    let width, height;
    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }
    window.addEventListener('resize', resize);
    resize();

    // UI Elements
    const uiContainer = document.getElementById('ui-container');
    const toggleUiBtn = document.getElementById('toggle-ui');
    const fpsDisplay = document.getElementById('fpsDisplay');
    const presetSelect = document.getElementById('presetSelect');
    const countSlider = document.getElementById('countSlider');
    const rmaxSlider = document.getElementById('rmaxSlider');
    const frictionSlider = document.getElementById('frictionSlider');
    const forceSlider = document.getElementById('forceSlider');
    const trailSlider = document.getElementById('trailSlider');
    const matrixDisplay = document.getElementById('matrixDisplay');
    
    let isUiVisible = true;
    toggleUiBtn.addEventListener('click', () => {
      isUiVisible = !isUiVisible;
      uiContainer.classList.toggle('hidden', !isUiVisible);
      toggleUiBtn.textContent = isUiVisible ? 'Hide UI (Tab)' : 'Show UI (Tab)';
    });
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        toggleUiBtn.click();
      }
    });

    // Simulation Parameters
    let NUM_COLORS = 6;
    // Neon colors for a stunning look
    const COLORS = [
      '#ff2a2a', // Neon Red
      '#00ffcc', // Neon Cyan
      '#ff00ff', // Neon Magenta
      '#ffff00', // Neon Yellow
      '#00ff00', // Neon Green
      '#ff8800'  // Neon Orange
    ];

    let rMin = 15; // Minimum radius (hard repulsion zone)
    let rMax = parseInt(rmaxSlider.value);
    let friction = parseFloat(frictionSlider.value);
    let forceMultiplier = parseFloat(forceSlider.value);
    let numParticles = parseInt(countSlider.value);
    let trailFactor = parseFloat(trailSlider.value);

    // Camera and Controls
    let camera = { x: 0, y: 0, zoom: 1.0, speed: 15 };
    let keys = {};
    window.addEventListener('keydown', (e) => { keys[e.code] = true; });
    window.addEventListener('keyup', (e) => { keys[e.code] = false; });

    // Arrays (Data Oriented Design for cache locality)
    let positionsX, positionsY, velocitiesX, velocitiesY, colorArr;
    let rules = []; // 2D array [NUM_COLORS][NUM_COLORS]
    
    // Spatial Grid 
    let grid = [];
    let cellSize = rMax;
    let gridWidth, gridHeight;

    function initArrays() {
      camera.x = width / 2;
      camera.y = height / 2;
      camera.zoom = 1.0;

      positionsX = new Float32Array(numParticles);
      positionsY = new Float32Array(numParticles);
      velocitiesX = new Float32Array(numParticles);
      velocitiesY = new Float32Array(numParticles);
      colorArr = new Uint8Array(numParticles);

      for (let i = 0; i < numParticles; i++) {
        positionsX[i] = Math.random() * width;
        positionsY[i] = Math.random() * height;
        colorArr[i] = Math.floor(Math.random() * NUM_COLORS);
      }
    }

    function generateRandomRules() {
      rules = [];
      for (let i = 0; i < NUM_COLORS; i++) {
        let row = [];
        for (let j = 0; j < NUM_COLORS; j++) {
          row.push((Math.random() * 2 - 1)); // -1 to 1
        }
        rules.push(row);
      }
      updateMatrixDisplay();
    }

    function applyPreset(preset) {
      if (preset === 'random') {
        generateRandomRules();
        return;
      }
      
      // Known good presets that generate cell-like structures
      rules = Array(NUM_COLORS).fill().map(() => Array(NUM_COLORS).fill(0));
      
      if (preset === 'cells') {
        // Cells: Similar colors attract strongly, but repel at close range (handled by force func). 
        // Different colors repel or have neutral interactions.
        for(let i=0; i<NUM_COLORS; i++) {
          for(let j=0; j<NUM_COLORS; j++) {
            if (i === j) rules[i][j] = 1.0; // Strong self-attraction
            else rules[i][j] = -0.1; // Slight repulsion from others
          }
        }
        // Predators and preys to make it dynamic
        rules[0][1] = 0.5; rules[1][0] = -0.5; // Red chases Cyan
        rules[2][3] = 0.5; rules[3][2] = -0.5; // Magenta chases Yellow
        rules[4][5] = 0.5; rules[5][4] = -0.5; // Green chases Orange
      } else if (preset === 'worms') {
        // Chains / Worms
        for(let i=0; i<NUM_COLORS; i++) {
          let next = (i + 1) % NUM_COLORS;
          rules[i][i] = 0.1; // Gentle self-attraction
          rules[i][next] = 0.9; // Attract to next color
          rules[next][i] = -0.5; // Next color repels from this
        }
      } else if (preset === 'snakes') {
         for(let i=0; i<NUM_COLORS; i++) {
            for(let j=0; j<NUM_COLORS; j++) {
                if (i===j) rules[i][j] = -0.1; // Slight self-repulsion
            }
            let next = (i+1)%NUM_COLORS;
            rules[i][next] = 1.0;
            rules[next][i] = -1.0;
         }
      } else if (preset === 'chaos') {
         // Binary extreme values
         for(let i=0; i<NUM_COLORS; i++) {
            for(let j=0; j<NUM_COLORS; j++) {
               rules[i][j] = Math.random() > 0.5 ? 1.0 : -1.0;
            }
         }
      }
      updateMatrixDisplay();
    }

    function updateMatrixDisplay() {
      matrixDisplay.innerHTML = '';
      matrixDisplay.style.gridTemplateColumns = `repeat(${NUM_COLORS}, 1fr)`;
      
      for (let i = 0; i < NUM_COLORS; i++) {
        let rowDiv = document.createElement('div');
        rowDiv.className = 'matrix-row';
        for (let j = 0; j < NUM_COLORS; j++) {
          let val = rules[i][j];
          let cell = document.createElement('div');
          cell.className = 'matrix-cell';
          // Color based on value: green for positive (attract), red for negative (repel)
          if (val > 0) {
            cell.style.backgroundColor = `rgba(0, 255, 204, ${val})`;
          } else {
            cell.style.backgroundColor = `rgba(255, 42, 42, ${-val})`;
          }
          rowDiv.appendChild(cell);
        }
        matrixDisplay.appendChild(rowDiv);
      }
    }

    function setupGrid() {
      cellSize = rMax;
      gridWidth = Math.ceil(width / cellSize);
      gridHeight = Math.ceil(height / cellSize);
      let totalCells = gridWidth * gridHeight;
      grid = new Array(totalCells);
      for(let i=0; i<totalCells; i++) grid[i] = [];
    }

    // Input Listeners
    countSlider.addEventListener('input', (e) => {
      document.getElementById('countVal').innerText = e.target.value;
    });
    countSlider.addEventListener('change', (e) => {
      numParticles = parseInt(e.target.value);
      initArrays();
    });

    rmaxSlider.addEventListener('input', (e) => {
      rMax = parseInt(e.target.value);
      document.getElementById('rmaxVal').innerText = rMax;
      setupGrid();
    });
    
    frictionSlider.addEventListener('input', (e) => {
      friction = parseFloat(e.target.value);
      document.getElementById('frictionVal').innerText = friction.toFixed(2);
    });

    forceSlider.addEventListener('input', (e) => {
      forceMultiplier = parseFloat(e.target.value);
      document.getElementById('forceVal').innerText = forceMultiplier.toFixed(1);
    });
    
    trailSlider.addEventListener('input', (e) => {
      trailFactor = parseFloat(e.target.value);
      document.getElementById('trailVal').innerText = trailFactor.toFixed(2);
    });

    presetSelect.addEventListener('change', (e) => {
      applyPreset(e.target.value);
    });

    document.getElementById('btnRandomize').addEventListener('click', () => {
      presetSelect.value = 'random';
      generateRandomRules();
    });

    document.getElementById('btnRestart').addEventListener('click', () => {
      initArrays();
    });

    // Physics Engine
    // The force function determines interaction based on distance (r) and rule value (a)
    function force(r, a) {
      if (r < rMin) {
        // Universal strong repulsion at very close range to prevent collapse
        return r / rMin - 1;
      } else if (rMin < r && r < rMax) {
        // Smooth transition for rule-based force (attract or repel)
        // Uses a peak in the middle of the range (bump function)
        return a * (1 - Math.abs(2 * r - rMin - rMax) / (rMax - rMin));
      } else {
        return 0;
      }
    }

    function updatePhysics() {
      // Clear grid
      for (let i = 0; i < grid.length; i++) grid[i].length = 0;
      
      // Populate grid for fast neighbor lookup
      for (let i = 0; i < numParticles; i++) {
        let cx = Math.floor(positionsX[i] / cellSize);
        let cy = Math.floor(positionsY[i] / cellSize);
        
        // Safety clamps
        if(cx < 0) cx = 0;
        if(cx >= gridWidth) cx = gridWidth - 1;
        if(cy < 0) cy = 0;
        if(cy >= gridHeight) cy = gridHeight - 1;

        grid[cy * gridWidth + cx].push(i);
      }

      let rMaxSq = rMax * rMax;
      
      for (let i = 0; i < numParticles; i++) {
        let px = positionsX[i];
        let py = positionsY[i];
        let pc = colorArr[i];
        
        let fx = 0;
        let fy = 0;

        let cx = Math.floor(px / cellSize);
        let cy = Math.floor(py / cellSize);

        // Check neighboring cells (3x3 grid)
        for (let y = cy - 1; y <= cy + 1; y++) {
          for (let x = cx - 1; x <= cx + 1; x++) {
            
            // Toroidal wrap for neighbor cell lookup
            let nx = x;
            let ny = y;

            if (nx < 0) nx = gridWidth - 1;
            else if (nx >= gridWidth) nx = 0;
            
            if (ny < 0) ny = gridHeight - 1;
            else if (ny >= gridHeight) ny = 0;

            let cellIdx = ny * gridWidth + nx;
            if(cellIdx < 0 || cellIdx >= grid.length) continue;
            
            let cell = grid[cellIdx];
            for (let j = 0; j < cell.length; j++) {
              let pIdx = cell[j];
              if (i === pIdx) continue;

              // Calculate shortest distance on torus
              let dx = positionsX[pIdx] - px;
              let dy = positionsY[pIdx] - py;
              
              if (dx > width * 0.5) dx -= width;
              else if (dx < -width * 0.5) dx += width;

              if (dy > height * 0.5) dy -= height;
              else if (dy < -height * 0.5) dy += height;
              
              let distSq = dx * dx + dy * dy;
              
              if (distSq > 0 && distSq < rMaxSq) {
                let dist = Math.sqrt(distSq);
                let ruleVal = rules[pc][colorArr[pIdx]];
                let f = force(dist, ruleVal);
                
                // Accumulate force vector
                fx += (dx / dist) * f;
                fy += (dy / dist) * f;
              }
            }
          }
        }

        // Apply force with multiplier parameter
        fx *= rMax * forceMultiplier;
        fy *= rMax * forceMultiplier;

        velocitiesX[i] += fx;
        velocitiesY[i] += fy;
        
        // Apply friction
        velocitiesX[i] *= (1 - friction);
        velocitiesY[i] *= (1 - friction);
      }

      // Apply velocities & keep in bounds (Toroidal)
      for (let i = 0; i < numParticles; i++) {
        // dt factor scaling down velocity per frame
        positionsX[i] += velocitiesX[i] * 0.05; 
        positionsY[i] += velocitiesY[i] * 0.05;

        if (positionsX[i] < 0) positionsX[i] += width;
        if (positionsX[i] >= width) positionsX[i] -= width;
        if (positionsY[i] < 0) positionsY[i] += height;
        if (positionsY[i] >= height) positionsY[i] -= height;
      }
    }

    // Render loop
    let lastTime = performance.now();
    let frames = 0;

    function handleCamera() {
      let speed = camera.speed / camera.zoom;
      if (keys['ArrowLeft']) camera.x -= speed;
      if (keys['ArrowRight']) camera.x += speed;
      if (keys['ArrowUp']) camera.y -= speed;
      if (keys['ArrowDown']) camera.y += speed;
      if (keys['KeyZ']) camera.zoom = Math.min(camera.zoom + 0.05, 5.0);
      if (keys['KeyX']) camera.zoom = Math.max(camera.zoom - 0.05, 0.1);
      if (keys['KeyC']) { camera.x = width / 2; camera.y = height / 2; camera.zoom = 1.0; }
    }

    function render() {
      handleCamera();

      // Motion blur / Trails effect (apply over the whole screen)
      ctx.setTransform(1, 0, 0, 1, 0, 0); // Reset transform for background
      if (trailFactor > 0) {
        ctx.fillStyle = `rgba(5, 5, 5, ${1 - trailFactor})`;
        ctx.fillRect(0, 0, width, height);
      } else {
        ctx.fillStyle = '#050505';
        ctx.fillRect(0, 0, width, height);
      }

      // Apply camera transform
      ctx.translate(width / 2, height / 2);
      ctx.scale(camera.zoom, camera.zoom);
      ctx.translate(-camera.x, -camera.y);

      // Draw primary particles (Batch by color for max performance)
      for(let c = 0; c < NUM_COLORS; c++) {
        ctx.fillStyle = COLORS[c];
        
        ctx.beginPath();
        for (let i = 0; i < numParticles; i++) {
          if(colorArr[i] === c) {
             let px = positionsX[i];
             let py = positionsY[i];
             // Render primary particle
             ctx.rect(px - 1.5, py - 1.5, 3, 3);
          }
        }
        ctx.fill();
      }

      // Draw 8 toroidal neighbors (clones) in grey/plomo to distinguish them
      ctx.fillStyle = '#444455'; // Plomo
      ctx.beginPath();
      for (let i = 0; i < numParticles; i++) {
         let px = positionsX[i];
         let py = positionsY[i];
         
         for (let dx = -1; dx <= 1; dx++) {
           for (let dy = -1; dy <= 1; dy++) {
             if (dx === 0 && dy === 0) continue;
             ctx.rect(px + dx * width - 1.5, py + dy * height - 1.5, 3, 3);
           }
         }
      }
      ctx.fill();

      updatePhysics();

      // FPS Calc
      frames++;
      let now = performance.now();
      if (now - lastTime >= 1000) {
        fpsDisplay.innerText = `${frames} FPS`;
        frames = 0;
        lastTime = now;
      }

      requestAnimationFrame(render);
    }

    // Init Simulation
    initArrays();
    applyPreset('random'); // Start with something impressive
    setupGrid();
    render();

  </script>
</body>
</html>
